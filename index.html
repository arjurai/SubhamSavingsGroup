<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subham Cooperative Savings</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d47a1">

<style>
body{font-family:Arial;margin:0;background:#f4f6f9}
header{
background:#0d47a1;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}
button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer}
.container{padding:15px}
.card{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
.member-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;
}
.member-card{
background:#e3f2fd;
padding:12px;
border-radius:8px;
}
.green{color:green}
.red{color:red}
.blue{color:#1e88e5}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd;text-align:left}
.admin-only{display:none}
textarea{width:100%;height:80px}
select,input{margin:5px 0;padding:5px}
</style>
</head>

<body>
  <div id="loginModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);justify-content:center;align-items:center;">
  <div style="background:white;padding:20px;border-radius:8px;width:300px;">
    <h3>Admin Login</h3>
    <input type="email" id="email" placeholder="Email" style="width:100%;margin-bottom:10px;">
    <input type="password" id="password" placeholder="Password" style="width:100%;margin-bottom:10px;">
    <button onclick="login()" style="width:100%;">Login</button>
  </div>
</div>

<header>
<h2>Subham Cooperative Savings</h2>
<div>
<span id="adminBadge" style="display:none;background:#ffcc00;color:black;padding:4px 8px;border-radius:6px">ADMIN</span>
<button id="loginBtn" onclick="showLogin()">Login</button>
<button id="logoutBtn" onclick="logout()" style="display:none;background:#ff4444;color:white">Logout</button>
</div>
</header>

<div class="container">
<div id="statusMessage" style="display:none;padding:10px;margin-bottom:10px;border-radius:6px;font-weight:bold;"></div>

<!-- DASHBOARD -->
<div class="card">
<h3>📊 Group Dashboard</h3>
<p>Total Savings: <b id="totalSavings">0</b> KRW</p>
<p>Total Loan Given: <b id="totalLoan">0</b> KRW</p>
<p>Total Interest Collected: <b id="totalInterest">0</b> KRW</p>
<p>Money Available: <b id="moneyAvailable">0</b> KRW</p>
</div>

<!-- NOTICE BOARD -->
<div class="card">
<h3>📢 Notice Board</h3>
<textarea id="noticeInput" style="display:none;"></textarea>
<button onclick="saveNotice()" id="noticeBtn" style="display:none;">Save Notice</button>
<p id="noticeDisplay"></p>
</div>

<!-- MEMBERS -->
<div class="card">
<h3>Members</h3>
<div id="members" class="member-grid"></div>
</div>

<!-- ADD TRANSACTION -->
<div class="card admin-only" id="addTransactionCard">
<h3>➕ Add Transaction</h3>

<select id="memberSelect"></select>

<select id="typeSelect">
<option value="savings">Savings</option>
<option value="loan_given">Loan Given</option>
<option value="loan_payment">Loan Payment</option>
<option value="interest_payment">Interest Payment</option>
</select>

<input type="number" id="amountInput" placeholder="Amount">
<input type="date" id="dateInput">
<button onclick="saveTransaction()" id="saveBtn">Add</button>
</div>

<!-- FILTER -->
<div class="card">
<h3>🔎 Filter Transactions</h3>

<select id="filterMember">
<option value="all">All Members</option>
</select>

<select id="quickRange">
<option value="all">All Time</option>
<option value="3">Last 3 Months</option>
<option value="6">Last 6 Months</option>
<option value="12">Last 1 Year</option>
</select>

<input type="date" id="fromDate">
<input type="date" id="toDate">
<button onclick="render()">Apply</button>
<button onclick="exportPDF()">Export PDF</button>
</div>

<!-- TRANSACTIONS -->
<div class="card">
<h3>Transactions</h3>
<table>
<thead>
<tr>
<th>Date</th>
<th>Member</th>
<th>Type</th>
<th>Amount</th>
<th class="admin-only">Action</th>
</tr>
</thead>
<tbody id="transactionTable"></tbody>
</table>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  
<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD8BSnJDY4ue-ifwK2G-so-3mWXr8OOepY",
  authDomain: "subhamsavingsgroup.firebaseapp.com",
  projectId: "subhamsavingsgroup",
  storageBucket: "subhamsavingsgroup.firebasestorage.app",
  messagingSenderId: "608599590080",
  appId: "1:608599590080:web:ca8cb8dca8b2618ec55925"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth = firebase.auth();
let admin = false;
auth.onAuthStateChanged(user => {

if(user){

  admin = true;   // THIS IS THE IMPORTANT LINE

  document.getElementById("adminBadge").style.display="inline";
  document.getElementById("loginBtn").style.display="none";
  document.getElementById("logoutBtn").style.display="inline";
  document.getElementById("noticeInput").style.display="block";
  document.getElementById("noticeBtn").style.display="inline-block";

  document.querySelectorAll(".admin-only").forEach(e=>{
     if(e.tagName==="TD"||e.tagName==="TH"){
        e.style.display="table-cell";
     }else{
        e.style.display="block";
     }
  });

}else{

  admin = false;   // AND THIS

  document.getElementById("adminBadge").style.display="none";
  document.getElementById("loginBtn").style.display="inline";
  document.getElementById("logoutBtn").style.display="none";
  document.getElementById("noticeInput").style.display="none";
  document.getElementById("noticeBtn").style.display="none";

  document.querySelectorAll(".admin-only").forEach(e=>{
     e.style.display="none";
  });

}

});


const INTEREST_RATE=0.01; // 1% per month

const members=[
"RAI ARJU","SHERMA BHAKTI","BUDHATHOKI SUKDEV",
"SHAHI LAXMAN BAHADUR","SHRESTHA TEKINDRA",
"GHIMIRE SURESH","TIWARI SURYA PARSAD",
"TAMANG KESHAR","RAI MANDIP","MAGAR MIM DARLAMI"
];

let transactions=[];
let editingId=null;
let filteredTransactions = [];
/* ================= LOAD DATA ================= */

db.collection("transactions")
.orderBy("date","desc")
.onSnapshot(snapshot=>{
transactions=[];
snapshot.forEach(doc=>{
transactions.push({id:doc.id,...doc.data()});
});
render();
});

const memberSelect=document.getElementById("memberSelect");
const filterMember=document.getElementById("filterMember");

members.forEach(m=>{
let o1=new Option(m,m);
let o2=new Option(m,m);
memberSelect.add(o1);
filterMember.add(o2);
});

/* ================= AUTHENCIATION ================= */

function showLogin(){
document.getElementById("loginModal").style.display="flex";
}

function login(){
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)
.then(()=>{
document.getElementById("loginModal").style.display="none";
})
.catch(error=>{
alert(error.message);
});
}

function logout(){
auth.signOut();
}

/* ================= TRANSACTION ================= */
function saveTransaction(){

if(!admin){
  alert("Only Admin Allowed");
  return;
}

let member = memberSelect.value;
let type = document.getElementById("typeSelect").value;
let amount = parseFloat(document.getElementById("amountInput").value);
let date = document.getElementById("dateInput").value;

if(!amount || !date) return alert("Enter all fields");

if(editingId){

  db.collection("transactions").doc(editingId).update({
    member,
    type,
    amount,
    date: firebase.firestore.Timestamp.fromDate(new Date(date))
  }).then(() => {
   editingId = null;
   document.getElementById("saveBtn").innerText = "Add";
   showStatus("Transaction Updated Successfully ✔", "green");
   document.getElementById("amountInput").value = "";
   document.getElementById("dateInput").value = "";
});
} else {

  db.collection("transactions").add({
  member,
  type,
  amount,
  date: firebase.firestore.Timestamp.fromDate(new Date(date))
})
.then(() => {
   showStatus("Transaction Added Successfully ✔", "green");
   document.getElementById("amountInput").value = "";
   document.getElementById("dateInput").value = "";
});
}

/* ================= RENDER ================= */

function render(){

/* ================= STEP 1 — CALCULATE DASHBOARD TOTALS ================= */

let totalSavings = 0;
let totalLoan = 0;
let totalInterest = 0;

transactions.forEach(t=>{
   if(t.type==="savings") totalSavings += t.amount;
   if(t.type==="loan_given") totalLoan += t.amount;
   if(t.type==="loan_payment") totalLoan -= t.amount;
   if(t.type==="interest_payment") totalInterest += t.amount;
});

/* ================= STEP 2 — UPDATE DASHBOARD ================= */

document.getElementById("totalSavings").innerText = totalSavings.toLocaleString();
document.getElementById("totalLoan").innerText = totalLoan.toLocaleString();
document.getElementById("totalInterest").innerText = totalInterest.toLocaleString();
document.getElementById("moneyAvailable").innerText = (totalSavings - totalLoan).toLocaleString();


/* ================= STEP 3 — APPLY FILTER FOR TABLE ONLY ================= */

let selectedMember = document.getElementById("filterMember").value;
let quick = document.getElementById("quickRange").value;
let from = document.getElementById("fromDate").value;
let to = document.getElementById("toDate").value;

let filtered = transactions.filter(t => {

   // Filter by member
   if(selectedMember !== "all" && t.member !== selectedMember)
      return false;

   let txDate = (t.date && typeof t.date.toDate === "function")
  ? t.date.toDate()
  : new Date(t.date);

   // Quick range filter (3 / 6 / 12 months)
   if(quick !== "all"){
      let past = new Date();
      past.setMonth(past.getMonth() - parseInt(quick));
      if(txDate < past) return false;
   }

   // Custom date filter
   if(from && txDate < new Date(from)) return false;
   if(to && txDate > new Date(to)) return false;

   return true;
});

// SORT BY DATE DESCENDING (NEWEST FIRST)
filtered.sort((a, b) => {
  let dateA = (a.date && typeof a.date.toDate === "function")
    ? a.date.toDate()
    : new Date(a.date);

  let dateB = (b.date && typeof b.date.toDate === "function")
    ? b.date.toDate()
    : new Date(b.date);

  return dateB - dateA; // newest first
});

filteredTransactions = filtered;
/* ================= STEP 4 — BUILD TRANSACTION TABLE ================= */

let table = "";

filtered.forEach(t=>{

table += `
<tr>
<td>${
  (t.date && typeof t.date.toDate === "function")
    ? t.date.toDate().toLocaleDateString()
    : new Date(t.date).toLocaleDateString()
}</td>
<td>${t.member}</td>
<td>${t.type}</td>
<td>${Number(t.amount).toLocaleString()} KRW</td>
<td>
  ${admin ? `
    <button onclick="editTx('${t.id}')">Edit</button>
    <button onclick="deleteTx('${t.id}')">Delete</button>
  ` : ""}
</td>
</tr>
`;
});

document.getElementById("transactionTable").innerHTML = table;


/* ================= STEP 5 — UPDATE MEMBER CARDS ================= */

renderMembers();

}

function showStatus(message, color){
  let box = document.getElementById("statusMessage");
  box.innerText = message;
  box.style.background = color;
  box.style.color = "white";
  box.style.display = "block";

  setTimeout(()=>{
    box.style.display = "none";
  }, 2500);
}

/* ================= DELETE ================= */

function deleteTx(id){

if(!admin) return;

if(confirm("Are you sure you want to delete this transaction?")){
   db.collection("transactions").doc(id).delete()
   .then(()=>{
      showStatus("Transaction Deleted ✔", "red");
   });
}

}
function editTx(id){

if(!admin) return;

let tx=transactions.find(t=>t.id===id);

memberSelect.value=tx.member;
document.getElementById("typeSelect").value=tx.type;
document.getElementById("amountInput").value=tx.amount;
document.getElementById("dateInput").value =
tx.date.toDate().toISOString().split("T")[0];

editingId=id;
document.getElementById("saveBtn").innerText="Update";
}

/* ================= MEMBER CARDS ================= */

function renderMembers(){

let container=document.getElementById("members");
container.innerHTML="";

members.forEach(name=>{

let savings=0;
let loan=0;
let interestPaid=0;
let lastLoanDate=null;

transactions.forEach(t=>{
if(t.member===name){
if(t.type==="savings") savings+=t.amount;
if(t.type==="loan_given"){ 
   loan+=t.amount; 
   lastLoanDate = (t.date && typeof t.date.toDate === "function")
  ? t.date.toDate()
  : new Date(t.date);
}
if(t.type==="loan_payment") loan-=t.amount;
if(t.type==="interest_payment") interestPaid+=t.amount;
}
});

let interestDue = 0;

if(loan > 0 && lastLoanDate){

   let now = new Date();
   let months = (now - lastLoanDate) / (1000 * 60 * 60 * 24 * 30);

   interestDue = (loan * INTEREST_RATE * months) - interestPaid;

   if(interestDue < 0) interestDue = 0;
}

container.innerHTML+=`
<div class="member-card">
<h4>${name}</h4>
<p>Savings: <span class="blue">${savings.toFixed(0)}</span></p>
<p>Loan Due: <span class="red">${loan.toFixed(0)}</span></p>
<p>Interest Due: <span class="red">${interestDue.toFixed(0)}</span></p>
<p>Net Balance: <span class="green">${(savings-loan).toFixed(0)}</span></p>
</div>`;
});
}

/* ================= NOTICE ================= */

db.collection("settings").doc("notice")
.onSnapshot(doc=>{
if(doc.exists){
document.getElementById("noticeDisplay").innerText=doc.data().text;
document.getElementById("noticeInput").value=doc.data().text;
}
});

function saveNotice(){

if(!admin){
  alert("Only Admin Allowed");
  return;
}

let text = document.getElementById("noticeInput").value;

db.collection("settings").doc("notice").set({ text })

.then(() => {
   alert("Notice Saved Successfully");
})

.catch((error) => {
   console.error("Notice Save Error:", error);
   alert("Error saving notice: " + error.message);
});

}

/* ================= PDF EXPORT ================= */

function exportPDF(){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

doc.setFontSize(14);
doc.text("Subham Cooperative Savings - Transactions Report", 14, 15);

let y = 25;
doc.setFontSize(10);

// Table Header
doc.text("Date", 14, y);
doc.text("Member", 45, y);
doc.text("Type", 95, y);
doc.text("Amount (KRW)", 150, y);
y += 8;

// Export ONLY filtered data
filteredTransactions.forEach(t => {

let dateStr = (t.date && typeof t.date.toDate === "function")
  ? t.date.toDate().toLocaleDateString()
  : new Date(t.date).toLocaleDateString();

doc.text(dateStr, 14, y);
doc.text(t.member, 45, y);
doc.text(t.type, 95, y);
doc.text(Number(t.amount).toLocaleString(), 150, y);

y += 8;

if(y > 280){
doc.addPage();
y = 20;
}
});

doc.save("Filtered_Transactions_Report.pdf");
}

</script>
</body>
</html>
