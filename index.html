/* ===== PREMIUM GLASS HEADER ===== */

.glass-header{
  position: fixed;

  left: 0;

  height: 95px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  border-radius: 0 0 30px 30px;

  box-shadow:

    inset 0 0 25px rgba(255,255,255,0.15);

  color: white;
  z-index: 1000;
  overflow: hidden;
}

/* ===== SOFT ANIMATED GLOW ===== */

.glass-header::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 60%);
  animation: glowMove 8s linear infinite;
  pointer-events:none;
}

@keyframes glowMove{
  0%{ transform: rotate(0deg); }
  100%{ transform: rotate(360deg); }
}

/* ===== SHINE ANIMATION ===== */

.glass-header::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:50%;
  height:100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.4),
    transparent
  );

}

}

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD8BSnJDY4ue-ifwK2G-so-3mWXr8OOepY",
  authDomain: "subhamsavingsgroup.firebaseapp.com",
  projectId: "subhamsavingsgroup",
  storageBucket: "subhamsavingsgroup.firebasestorage.app",
  messagingSenderId: "608599590080",
  appId: "1:608599590080:web:ca8cb8dca8b2618ec55925"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth = firebase.auth();
let admin = false;
auth.onAuthStateChanged(user => {

if(user){

  admin = true;   // THIS IS THE IMPORTANT LINE

  document.getElementById("adminBadge").style.display="inline";
  document.getElementById("loginBtn").style.display="none";
  document.getElementById("logoutBtn").style.display="inline";
  document.getElementById("noticeInput").style.display="block";
  document.getElementById("noticeBtn").style.display="inline-block";

  document.querySelectorAll(".admin-only").forEach(e=>{
     if(e.tagName==="TD"||e.tagName==="TH"){
        e.style.display="table-cell";
     }else{
        e.style.display="block";
     }
  });

}else{

  admin = false;   // AND THIS

  document.getElementById("adminBadge").style.display="none";
  document.getElementById("loginBtn").style.display="inline";
  document.getElementById("logoutBtn").style.display="none";
  document.getElementById("noticeInput").style.display="none";
  document.getElementById("noticeBtn").style.display="none";

  document.querySelectorAll(".admin-only").forEach(e=>{
     e.style.display="none";
  });

}

});


const INTEREST_RATE=0.01; // 1% per month

const members=[
"RAI ARJU","SHERMA BHAKTI","BUDHATHOKI SUKDEV",
"SHAHI LAXMAN BAHADUR","SHRESTHA TEKINDRA",
"GHIMIRE SURESH","TIWARI SURYA PARSAD",
"TAMANG KESHAR","RAI MANDIP","MAGAR MIM DARLAMI"
];

let transactions=[];
let editingId=null;
let filteredTransactions = [];
/* ================= LOAD DATA ================= */

db.collection("transactions")
.orderBy("date","desc")
.onSnapshot(snapshot=>{
transactions=[];
snapshot.forEach(doc=>{
transactions.push({id:doc.id,...doc.data()});
});
render();
});

const memberSelect=document.getElementById("memberSelect");
const filterMember=document.getElementById("filterMember");

members.forEach(m=>{
let o1=new Option(m,m);
let o2=new Option(m,m);
memberSelect.add(o1);
filterMember.add(o2);
});

/* ================= AUTHENCIATION ================= */

function showLogin(){
  document.getElementById("loginModal").style.display="flex";
  document.body.style.overflow="hidden";
}

function login(){
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)
.then(()=>{
  document.getElementById("loginModal").style.display="none";
  document.body.style.overflow="auto";
})
.catch(error=>{
alert(error.message);
});
}

function logout(){
auth.signOut();
}

/* ================= TRANSACTION ================= */
function saveTransaction(){

if(!admin){
  alert("Only Admin Allowed");
  return;
}

let member = memberSelect.value;
let type = document.getElementById("typeSelect").value;
let amount = parseFloat(document.getElementById("amountInput").value);
let date = document.getElementById("dateInput").value;

if(!amount || !date){
  alert("Enter all fields");
  return;
}

let txDate = new Date(date);

if(editingId){

  db.collection("transactions").doc(editingId).update({
    member,
    type,
    amount,
    date: firebase.firestore.Timestamp.fromDate(txDate)
  }).then(()=>{
    editingId = null;
    document.getElementById("saveBtn").innerText = "Add";
    showStatus("Transaction Updated Successfully ✔", "green");
    document.getElementById("amountInput").value = ""; 
  });

} else {

  db.collection("transactions").add({
    member,
    type,
    amount,
    date: firebase.firestore.Timestamp.fromDate(txDate)
  }).then(()=>{
    showStatus("Transaction Added Successfully ✔", "green");
    document.getElementById("amountInput").value = "";
  });

}
}

/* ================= RENDER ================= */

function render(){

/* ================= STEP 1 — CALCULATE DASHBOARD TOTALS ================= */

let totalSavings = 0;
let totalLoan = 0;
let totalInterest = 0;

transactions.forEach(t=>{
   if(t.type==="savings") totalSavings += t.amount;
   if(t.type==="loan_given") totalLoan += t.amount;
   if(t.type==="loan_payment") totalLoan -= t.amount;
   if(t.type==="interest_payment") totalInterest += t.amount;
});

/* ================= STEP 2 — UPDATE DASHBOARD ================= */

animateCounter("totalSavings", totalSavings);
animateCounter("totalLoan", totalLoan);
animateCounter("totalInterest", totalInterest);
animateCounter("moneyAvailable", totalSavings - totalLoan);


/* ================= STEP 3 — APPLY FILTER FOR TABLE ONLY ================= */

let selectedMember = document.getElementById("filterMember").value;
let quick = document.getElementById("quickRange").value;
let from = document.getElementById("fromDate").value;
let to = document.getElementById("toDate").value;

let filtered = transactions.filter(t => {

   // Filter by member
   if(selectedMember !== "all" && t.member !== selectedMember)
      return false;

   let txDate = (t.date && typeof t.date.toDate === "function")
  ? t.date.toDate()
  : new Date(t.date);

   // Quick range filter (3 / 6 / 12 months)
   if(quick !== "all"){
      let past = new Date();
      past.setMonth(past.getMonth() - parseInt(quick));
      if(txDate < past) return false;
   }

   // Custom date filter
   if(from && txDate < new Date(from)) return false;
   if(to && txDate > new Date(to)) return false;

   return true;
});

// SORT BY DATE DESCENDING (NEWEST FIRST)
filtered.sort((a, b) => {
  let dateA = (a.date && typeof a.date.toDate === "function")
    ? a.date.toDate()
    : new Date(a.date);

  let dateB = (b.date && typeof b.date.toDate === "function")
    ? b.date.toDate()
    : new Date(b.date);

  return dateB - dateA; // newest first
});

filteredTransactions = filtered;
/* ================= STEP 4 — BUILD TRANSACTION TABLE ================= */

let table = "";

filtered.forEach(t=>{

table += `
<tr>
<td>${
  (t.date && typeof t.date.toDate === "function")
    ? t.date.toDate().toLocaleDateString()
    : new Date(t.date).toLocaleDateString()
}</td>
<td>${t.member}</td>
<td>${t.type}</td>
<td>${Number(t.amount).toLocaleString()} KRW</td>
<td>
  ${admin ? `
    <button onclick="editTx('${t.id}')">Edit</button>
    <button onclick="deleteTx('${t.id}')">Delete</button>
  ` : ""}
</td>
</tr>
`;
});

document.getElementById("transactionTable").innerHTML = table;


/* ================= STEP 5 — UPDATE MEMBER CARDS ================= */

renderMembers();

}

function showStatus(message, color){

  let box = document.getElementById("statusMessage");

  box.innerText = message;
  box.style.background = color;
  box.style.display = "block";
  box.style.opacity = "1";

  setTimeout(()=>{
    box.style.transition = "opacity 0.4s";
    box.style.opacity = "0";

    setTimeout(()=>{
      box.style.display = "none";
      box.style.transition = "";
    }, 400);

  }, 2000);
}
/* ================= DELETE ================= */

function deleteTx(id){

if(!admin) return;

if(confirm("Are you sure you want to delete this transaction?")){
   db.collection("transactions").doc(id).delete()
   .then(()=>{
      showStatus("Transaction Deleted ✔", "red");
   });
}

}
function editTx(id){

if(!admin) return;

let tx=transactions.find(t=>t.id===id);

memberSelect.value=tx.member;
document.getElementById("typeSelect").value=tx.type;
document.getElementById("amountInput").value=tx.amount;
let d = (tx.date && typeof tx.date.toDate === "function")
  ? tx.date.toDate()
  : new Date(tx.date);

document.getElementById("dateInput").value =
d.toISOString().split("T")[0];

editingId=id;
document.getElementById("saveBtn").innerText="Update";
}

/* ================= MEMBER CARDS ================= */

function renderMembers(){

let container = document.getElementById("members");
container.innerHTML = "";

members.forEach(name=>{

let savings = 0;
let loan = 0;
let interestPaid = 0;
let loanStartDate = null;

transactions.forEach(t=>{

  if(t.member === name){

    if(t.type==="savings") savings += t.amount;

    if(t.type==="loan_given"){
      loan += t.amount;

      let d = (t.date && typeof t.date.toDate==="function")
        ? t.date.toDate()
        : new Date(t.date);

      if(!loanStartDate || d < loanStartDate){
        loanStartDate = d;
      }
    }

    if(t.type==="loan_payment"){
      loan -= t.amount;

      if(loan <= 0){
        loan = 0;
        loanStartDate = null;
      }
    }

    if(t.type==="interest_payment"){
      interestPaid += t.amount;
    }

  }

});

let interestDue = 0;

if(loan > 0 && loanStartDate){

  let today = new Date();

  let months =
    (today.getFullYear() - loanStartDate.getFullYear()) * 12 +
    (today.getMonth() - loanStartDate.getMonth());

  if(months < 0) months = 0;

  let totalInterest = loan * INTEREST_RATE * months;

  interestDue = totalInterest - interestPaid;

  if(interestDue < 0) interestDue = 0;

}

container.innerHTML += `
<div class="member-card">
<h4>${name}</h4>
<p>Savings: <span class="blue">${savings.toFixed(0)}</span></p>
<p>Loan Due: <span class="red">${loan.toFixed(0)}</span></p>
<p>Interest Due: <span class="red">${interestDue.toFixed(0)}</span></p>
<p>Net Balance: <span class="green">${(savings-loan).toFixed(0)}</span></p>
</div>`;

});
}

/* ===== Animated Counter ===== */
function animateCounter(id, target){

  let element = document.getElementById(id);
  let start = 0;
  let duration = 800;
  let stepTime = 15;
  let increment = target / (duration / stepTime);

  let counter = setInterval(() => {
    start += increment;

    if(start >= target){
      start = target;
      clearInterval(counter);
    }

    element.innerText = Math.floor(start).toLocaleString();
  }, stepTime);
}

/* ===== Simple Floating Particles ===== */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

for(let i=0;i<40;i++){
  particlesArray.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    radius: Math.random()*3+1,
    dx: (Math.random()-0.5)*0.5,
    dy: (Math.random()-0.5)*0.5
  });
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particlesArray.forEach(p=>{
    p.x += p.dx;
    p.y += p.dy;

    if(p.x<0 || p.x>canvas.width) p.dx*=-1;
    if(p.y<0 || p.y>canvas.height) p.dy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
    ctx.fillStyle="rgba(13,71,161,0.3)";
    ctx.fill();
  });

  requestAnimationFrame(animateParticles);
}

animateParticles();
