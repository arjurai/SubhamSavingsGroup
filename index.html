<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subham Savings Group</title>

<style>
body {
  font-family: Arial;
  background:#eef2f7;
  padding:20px;
}

/* 🔥 Poster Style Header */
.header {
  background: linear-gradient(135deg,#002b5c,#00509e,#00a8e8);
  color:white;
  padding:30px;
  border-radius:15px;
  text-align:center;
  margin-bottom:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  animation: glow 3s infinite alternate;
  cursor:pointer;
}

.header h1 {
  margin:0;
  font-size:32px;
  letter-spacing:2px;
}

.header p {
  margin:5px 0 0;
  font-size:14px;
  opacity:0.9;
}

@keyframes glow {
  from { box-shadow:0 0 10px #00a8e8; }
  to { box-shadow:0 0 25px #00e5ff; }
}

.card {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.blue { color:#0077ff; }
.red { color:#e63946; }
.green { color:#2a9d8f; }

button {
  padding:8px 12px;
  border:none;
  border-radius:5px;
  background:#002b5c;
  color:white;
  cursor:pointer;
  margin-top:5px;
}

select,input {
  padding:8px;
  width:100%;
  margin:5px 0;
  border-radius:5px;
  border:1px solid #ccc;
}

#adminPanel { display:none; }

.small {
  font-size:13px;
  margin:5px 0;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import jsPDF from "https://cdn.jsdelivr.net/npm/jspdf@2.5.1/+esm";

/* 🔑 PASTE YOUR REAL CONFIG HERE */
const firebaseConfig = {
  apiKey: "AIzaSyD8BSnJDY4ue-ifwK2G-so-3mWXr8OOepY",
  authDomain: "subhamsavingsgroup.firebaseapp.com",
  projectId: "subhamsavingsgroup",
  storageBucket: "subhamsavingsgroup.firebasestorage.app",
  messagingSenderId: "608599590080",
  appId: "1:608599590080:web:ca8cb8dca8b2618ec55925"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const groupRef = doc(db,"group","data");

const MEMBERS = [
"RAI ARJU","SHERMA BHAKTI","BUDHATHOKI SUKDEV",
"SHAHI LAXMAN BAHADUR","SHRESTHA TEKINDRA",
"GHIMIRE SURESH","TIWARI SURYA PARSAD",
"TAMANG KESHAR","RAI MANDIP","MAGAR MIM DARLAMI"
];

let data = { members:{}, transactions:[], interestRate:1 };
let isAdmin = false;

/* ===== Logic ===== */

function initMembers(){
  MEMBERS.forEach(n=>{
    if(!data.members[n]){
      data.members[n]={ savings:0, loan:0, interestPaid:0 };
    }
  });
}

function monthsBetween(start,end){
  const diff=(end-start)/(1000*60*60*24);
  if(diff<30) return 1;
  const full=Math.floor(diff/30);
  const extra=diff-(full*30);
  if(extra>=15) return full+1;
  return full;
}

function calculateDue(name){
  const m=data.members[name];
  if(m.loan<=0) return 0;
  const lastLoan=[...data.transactions].reverse().find(t=>t.type==="loan"&&t.name===name);
  if(!lastLoan) return 0;
  const months=monthsBetween(new Date(lastLoan.date),new Date());
  return (m.loan*data.interestRate/100)*months - m.interestPaid;
}

async function save(){ await setDoc(groupRef,data); }

onSnapshot(groupRef,(snap)=>{
  if(snap.exists()){
    data=snap.data();
    render();
  } else {
    initMembers();
    save();
  }
});

function addTransaction(type,name,amount,date){
  data.transactions.push({type,name,amount,date});
  if(type==="savings") data.members[name].savings+=amount;
  if(type==="loan") data.members[name].loan+=amount;
  if(type==="payment") data.members[name].loan-=amount;
  if(type==="interest") data.members[name].interestPaid+=amount;
  save();
}

/* 🔒 Admin-only Delete */
window.deleteTransaction=function(index){
  if(!isAdmin){
    alert("Admin access required");
    return;
  }
  const t=data.transactions[index];
  if(t.type==="savings") data.members[t.name].savings-=t.amount;
  if(t.type==="loan") data.members[t.name].loan-=t.amount;
  if(t.type==="payment") data.members[t.name].loan+=t.amount;
  if(t.type==="interest") data.members[t.name].interestPaid-=t.amount;
  data.transactions.splice(index,1);
  save();
}

function render(){
  let totalSavings=0,totalLoan=0,totalInterest=0;
  let membersHTML="";

  MEMBERS.forEach(name=>{
    const m=data.members[name];
    const due=calculateDue(name);
    totalSavings+=m.savings;
    totalLoan+=m.loan;
    totalInterest+=m.interestPaid;

    membersHTML+=`
    <div class="card">
      <h3>${name}</h3>
      <p class="blue">Savings: ₩${m.savings}</p>
      <p class="red">Loan: ₩${m.loan}</p>
      <p class="green">Due Interest: ₩${due.toFixed(0)}</p>
    </div>`;
  });

  document.getElementById("members").innerHTML=membersHTML;

  document.getElementById("totals").innerHTML=`
  <div class="card">
    <h3>Group Overview</h3>
    <p><b>Total Group Money:</b> ₩${totalSavings-totalLoan+totalInterest}</p>
    <p class="blue">Savings Collected: ₩${totalSavings}</p>
    <p class="red">Money Invested: ₩${totalLoan}</p>
    <p class="green">Interest Collected: ₩${totalInterest}</p>
  </div>`;

  let txHTML="<div class='card'><h3>Transactions</h3>";
  data.transactions.forEach((t,i)=>{
    txHTML+=`
    <div class="small">
      ${t.date} | ${t.name} | ${t.type} | ₩${t.amount}
      ${isAdmin ? `<button onclick="deleteTransaction(${i})">Delete</button>` : ""}
    </div>`;
  });
  txHTML+="</div>";
  document.getElementById("transactions").innerHTML=txHTML;
}

window.submitTransaction=function(){
  if(!isAdmin){ alert("Admin only"); return; }
  const name=document.getElementById("memberSelect").value;
  const type=document.getElementById("typeSelect").value;
  const amount=parseFloat(document.getElementById("amountInput").value);
  const date=document.getElementById("dateInput").value;
  if(!amount||!date) return alert("Enter amount and date");
  addTransaction(type,name,amount,date);
  document.getElementById("amountInput").value="";
}

/* PDF Export */
window.exportPDF=function(){
  if(!isAdmin){ alert("Admin only"); return; }
  const docPDF=new jsPDF();
  docPDF.text("Subham Savings Group Report",20,20);
  let y=30;
  MEMBERS.forEach(name=>{
    const m=data.members[name];
    const due=calculateDue(name);
    docPDF.text(`${name} | Savings:${m.savings} | Loan:${m.loan} | Due:${due.toFixed(0)}`,20,y);
    y+=10;
  });
  docPDF.save("Subham_Savings_Report.pdf");
}

/* Admin Login */
let taps=0;
document.addEventListener("DOMContentLoaded",()=>{
  MEMBERS.forEach(name=>{
    const opt=document.createElement("option");
    opt.value=name;
    opt.textContent=name;
    memberSelect.appendChild(opt);
  });

  document.getElementById("headerTap").onclick=()=>{
    taps++;
    if(taps===5){
      if(prompt("Enter Admin PIN")==="6356"){
        isAdmin=true;
        document.getElementById("adminPanel").style.display="block";
        render();
      }
      taps=0;
    }
  };
});
</script>
</head>

<body>

<div class="header" id="headerTap">
  <h1>SUBHAM SAVINGS GROUP</h1>
  <p>Secure • Transparent • Professional</p>
</div>

<div id="totals"></div>
<div id="members"></div>
<div id="transactions"></div>

<div id="adminPanel" class="card">
<h3>Admin Panel</h3>
<select id="memberSelect"></select>
<select id="typeSelect">
<option value="savings">Savings Deposit</option>
<option value="loan">Loan Given</option>
<option value="payment">Loan Payment</option>
<option value="interest">Interest Payment</option>
</select>
<input type="number" id="amountInput" placeholder="Amount (KRW)">
<input type="date" id="dateInput">
<button onclick="submitTransaction()">Submit</button>
<button onclick="exportPDF()">Export PDF</button>
</div>

</body>
</html>
