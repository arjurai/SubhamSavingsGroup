<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subham Savings Group</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a237e">

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; padding:15px;}
h1 { text-align:center; color:#1a237e; }

.card { background:white; padding:15px; margin:10px 0; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.blue { color:#1565c0; }
.red { color:#c62828; }
.green { color:#2e7d32; }

button { padding:8px 12px; margin:5px 0; border:none; border-radius:6px; cursor:pointer;}
.primary { background:#1a237e; color:white;}
.danger { background:#c62828; color:white;}
input, select { padding:6px; margin:5px 0; width:100%; }
.hidden { display:none; }
</style>
</head>
<body>

<h1>Subham Savings Group</h1>

<div id="adminLogin" class="card">
<h3>Admin Login</h3>
<input type="password" id="pinInput" placeholder="Enter PIN">
<button class="primary" onclick="login()">Login</button>
</div>

<div id="adminPanel" class="hidden">

<div class="card">
<h3>Add Savings</h3>
<select id="memberSelect"></select>
<input type="number" id="savingAmount" placeholder="Amount (KRW)">
<input type="date" id="savingDate">
<button class="primary" onclick="addSaving()">Add</button>
</div>

<div class="card">
<h3>Give Loan</h3>
<select id="loanMember"></select>
<input type="number" id="loanAmount" placeholder="Loan Amount (KRW)">
<input type="date" id="loanDate">
<button class="primary" onclick="giveLoan()">Give Loan</button>
</div>

<div class="card">
<h3>Receive Payment</h3>
<select id="payMember"></select>
<input type="number" id="payAmount" placeholder="Payment Amount (KRW)">
<input type="date" id="payDate">
<button class="primary" onclick="receivePayment()">Receive</button>
</div>

</div>

<div class="card">
<h3>Members</h3>
<div id="membersList"></div>
</div>

<script>
const PIN = "6356";
const INTEREST = 0.01;

let members = [
"Member 1","Member 2","Member 3","Member 4","Member 5",
"Member 6","Member 7","Member 8","Member 9","Member 10"
];

let data = JSON.parse(localStorage.getItem("groupData")) || {};

members.forEach(m => {
if(!data[m]) data[m] = { savings:[], loans:[], payments:[] };
});

function saveData(){
localStorage.setItem("groupData", JSON.stringify(data));
}

function login(){
if(document.getElementById("pinInput").value === PIN){
document.getElementById("adminPanel").classList.remove("hidden");
alert("Admin Mode Activated");
}
}

function populateSelects(){
["memberSelect","loanMember","payMember"].forEach(id=>{
let select=document.getElementById(id);
members.forEach(m=>{
let opt=document.createElement("option");
opt.value=m; opt.text=m;
select.appendChild(opt);
});
});
}
populateSelects();

function addSaving(){
let m=document.getElementById("memberSelect").value;
let amt=Number(document.getElementById("savingAmount").value);
let date=document.getElementById("savingDate").value;
if(!date) return alert("Select date");
data[m].savings.push({amount:amt,date:date});
saveData(); render();
}

function giveLoan(){
let m=document.getElementById("loanMember").value;
let amt=Number(document.getElementById("loanAmount").value);
let date=document.getElementById("loanDate").value;
if(!date) return alert("Select date");
data[m].loans.push({amount:amt,date:date});
saveData(); render();
}

function receivePayment(){
let m=document.getElementById("payMember").value;
let amt=Number(document.getElementById("payAmount").value);
let date=document.getElementById("payDate").value;
if(!date) return alert("Select date");
data[m].payments.push({amount:amt,date:date});
saveData(); render();
}

function calculateLoan(member){
let totalLoan=0;
let totalPaid=0;
let totalInterest=0;

data[member].loans.forEach(loan=>{
let loanDate=new Date(loan.date);
let today=new Date();
let diffDays=Math.floor((today-loanDate)/(1000*60*60*24));

let months=Math.floor(diffDays/30);
if(months===0) months=1;

if(months>=1 && diffDays%30<20) {}

let interest=loan.amount*INTEREST*months;
totalInterest+=interest;
totalLoan+=loan.amount+interest;
});

data[member].payments.forEach(p=> totalPaid+=p.amount);

return {due: totalLoan-totalPaid, interest: totalInterest};
}

function render(){
let html="";
members.forEach(m=>{
let totalSavings=data[m].savings.reduce((a,b)=>a+b.amount,0);
let loanInfo=calculateLoan(m);

html+=`
<div class="card">
<h4>${m}</h4>
<div class="blue">Savings: ₩${totalSavings.toLocaleString()}</div>
<div class="red">Loan Due: ₩${loanInfo.due.toLocaleString()}</div>
<div class="green">Interest Earned: ₩${loanInfo.interest.toLocaleString()}</div>
</div>`;
});
document.getElementById("membersList").innerHTML=html;
}
render();

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
