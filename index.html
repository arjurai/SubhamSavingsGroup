<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subham Savings Group</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getDocs as getDocs2 } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.jspdfLoaded = false;
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Arial;
background:#f1f5f9;
margin:0;
}

header{
background:linear-gradient(45deg,#1e3c72,#2a5298);
color:white;
text-align:center;
padding:25px;
font-size:28px;
font-weight:bold;
letter-spacing:2px;
}

.container{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.full{
grid-column:1/3;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.members-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

.member-card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.2s;
}

.member-card:hover{
transform:scale(1.02);
}

.transaction-box{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.blue{color:blue;}
.red{color:red;}
.green{color:green;}
.hidden{display:none;}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#2a5298;
color:white;
cursor:pointer;
margin-top:5px;
}

input,select,textarea{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}
</style>
</head>
<body>

<header>💰 Subham Savings Group</header>

<div class="container">

<div class="card">
<h3>📊 Group Dashboard</h3>
<p>Total Savings: <span class="blue" id="totalSavings">0</span> KRW</p>
<p>Total Interest: <span class="green" id="totalInterest">0</span> KRW</p>
<p>Total Invested: <span class="red" id="totalInvested">0</span> KRW</p>
<p>Money Available: <span class="green" id="moneyAvailable">0</span> KRW</p>
<p>Share Per Person (10): <span class="blue" id="sharePerPerson">0</span> KRW</p>
</div>

<div class="card">
<h3>🔐 Admin Login</h3>
<input type="password" id="pin" placeholder="Enter PIN">
<button onclick="login()">Login</button>

<div id="adminPanel" class="hidden">
<select id="memberSelect"></select>

<select id="type">
<option value="savings">Savings</option>
<option value="loan">Loan</option>
<option value="principal_payment">Principal Payment</option>
<option value="interest_payment">Interest Payment</option>
</select>

<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">
<button onclick="addTransaction()">Add Transaction</button>
</div>
</div>

<div class="full">
<h3>👥 Members</h3>
<div id="members" class="members-grid"></div>
</div>

<div class="full card">
<h3>📑 Transactions Panel</h3>

<select id="filterMember">
<option value="all">All Members</option>
</select>

<select id="filterPeriod">
<option value="all">All Time</option>
<option value="3">Last 3 Months</option>
<option value="6">Last 6 Months</option>
<option value="12">Last 1 Year</option>
</select>

<button onclick="loadFiltered()">Apply Filter</button>
<button onclick="exportPDF()">Export PDF</button>

<div id="transactionsView"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8BSnJDY4ue-ifwK2G-so-3mWXr8OOepY",
  authDomain: "subhamsavingsgroup.firebaseapp.com",
  projectId: "subhamsavingsgroup",
  storageBucket: "subhamsavingsgroup.firebasestorage.app",
  messagingSenderId: "608599590080",
  appId: "1:608599590080:web:ca8cb8dca8b2618ec55925"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const members=[
"RAI ARJU",
"SHERMA BHAKTI",
"BUDHATHOKI SUKDEV",
"SHAHI LAXMAN BAHADUR",
"SHRESTHA TEKINDRA",
"GHIMIRE SURESH",
"TIWARI SURYA PARSAD",
"TAMANG KESHAR",
"RAI MANDIP",
"MAGAR MIM DARLAMI"
];

let transactions=[];
let admin=false;

members.forEach(m=>{
document.getElementById("memberSelect").innerHTML+=`<option>${m}</option>`;
document.getElementById("filterMember").innerHTML+=`<option value="${m}">${m}</option>`;
});

window.login=function(){
if(document.getElementById("pin").value==="6356"){
admin=true;
document.getElementById("adminPanel").classList.remove("hidden");
alert("Admin Logged In");
}
}

window.addTransaction=async function(){
if(!admin)return alert("Admin Only");
let member=memberSelect.value;
let type=type.value;
let amount=parseFloat(document.getElementById("amount").value);
let date=document.getElementById("date").value;
await addDoc(collection(db,"transactions"),{member,type,amount,date});
loadData();
}

async function loadData(){
transactions=[];
const snap=await getDocs(collection(db,"transactions"));
snap.forEach(d=>transactions.push({...d.data(),id:d.id}));
render();
}

function calculateInterest(p,start,end){
let diff=(new Date(end)-new Date(start))/(1000*60*60*24);
let months=Math.floor(diff/30);
if(diff<30)return p*0.01;
if(diff%30<=15)return p*0.01*months;
return p*0.01*(months+1);
}

function render(){
let totalSavings=0,totalInterest=0,totalInvested=0;

let container=document.getElementById("members");
container.innerHTML="";

members.forEach(name=>{
let tx=transactions.filter(t=>t.member===name);
let savings=tx.filter(t=>t.type==="savings").reduce((a,b)=>a+b.amount,0);
let loan=tx.filter(t=>t.type==="loan").reduce((a,b)=>a+b.amount,0);
let principal=tx.filter(t=>t.type==="principal_payment").reduce((a,b)=>a+b.amount,0);
let interest=tx.filter(t=>t.type==="interest_payment").reduce((a,b)=>a+b.amount,0);

let principalDue=loan-principal;
let dueInterest=0;

tx.filter(t=>t.type==="loan").forEach(l=>{
dueInterest+=calculateInterest(l.amount,l.date,new Date());
});
dueInterest-=interest;

totalSavings+=savings;
totalInterest+=interest;
totalInvested+=principalDue;

container.innerHTML+=`
<div class="member-card">
<h4>${name}</h4>
<p>Savings: <span class="blue">${savings}</span></p>
<p>Due Principal: <span class="red">${principalDue}</span></p>
<p>Due Interest: <span class="red">${dueInterest}</span></p>
</div>`;
});

document.getElementById("totalSavings").innerText=totalSavings;
document.getElementById("totalInterest").innerText=totalInterest;
document.getElementById("totalInvested").innerText=totalInvested;

let available=totalSavings+totalInterest-totalInvested;
document.getElementById("moneyAvailable").innerText=available;

document.getElementById("sharePerPerson").innerText=((totalSavings+totalInterest)/10).toFixed(2);
}

window.loadFiltered=function(){
let member=filterMember.value;
let period=filterPeriod.value;
let filtered=[...transactions];

if(member!=="all"){
filtered=filtered.filter(t=>t.member===member);
}

if(period!=="all"){
let cutoff=new Date();
cutoff.setMonth(cutoff.getMonth()-parseInt(period));
filtered=filtered.filter(t=>new Date(t.date)>=cutoff);
}

let view=document.getElementById("transactionsView");
view.innerHTML="";

filtered.forEach(t=>{
view.innerHTML+=`
<div class="transaction-box">
<b>${t.member}</b><br>
${t.date} — ${t.type} — ${t.amount}
${admin?`<button onclick="deleteTx('${t.id}')">Delete</button>`:""}
</div>`;
});
}

window.deleteTx=async function(id){
if(!admin)return;
await deleteDoc(doc(db,"transactions",id));
loadData();
}

window.exportPDF=function(){
let { jsPDF }=window.jspdf;
let doc=new jsPDF();
doc.text("Subham Savings Group - Report",20,20);
let y=30;
document.querySelectorAll(".transaction-box").forEach(box=>{
doc.text(box.innerText,20,y);
y+=10;
});
doc.save("Report.pdf");
}

loadData();

</script>
</body>
</html>
