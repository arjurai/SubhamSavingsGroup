<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subham Savings Group</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a237e">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; padding:15px;}
h1 { text-align:center; color:#1a237e; cursor:pointer;}
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.blue { color:#1565c0; font-weight:bold;}
.red { color:#c62828; font-weight:bold;}
.green { color:#2e7d32; font-weight:bold;}
button { padding:8px 12px; margin:5px 0; border:none; border-radius:6px; cursor:pointer;}
.primary { background:#1a237e; color:white;}
.export { background:#00897b; color:white;}
input, select { padding:6px; margin:5px 0; width:100%; }
.hidden { display:none; }
.dashboard { font-size:15px; }
</style>
</head>
<body>

<h1 onclick="tapTitle()">Subham Savings Group</h1>

<div id="adminLogin" class="card hidden">
<h3>Admin Login</h3>
<input type="password" id="pinInput" placeholder="Enter PIN">
<button class="primary" onclick="login()">Login</button>
</div>

<div id="adminPanel" class="hidden">

<div class="card">
<h3>Add Savings</h3>
<select id="memberSelect"></select>
<input type="number" id="savingAmount" placeholder="Amount (KRW)">
<input type="date" id="savingDate">
<button class="primary" onclick="addSaving()">Add</button>
</div>

<div class="card">
<h3>Give Loan</h3>
<select id="loanMember"></select>
<input type="number" id="loanAmount" placeholder="Loan Amount (KRW)">
<input type="date" id="loanDate">
<button class="primary" onclick="giveLoan()">Give Loan</button>
</div>

<div class="card">
<h3>Receive Payment</h3>
<select id="payMember"></select>
<input type="number" id="payAmount" placeholder="Payment Amount (KRW)">
<input type="date" id="payDate">
<button class="primary" onclick="receivePayment()">Receive</button>
</div>

</div>

<div class="card dashboard">
<h3>📊 Group Dashboard</h3>
<div class="blue" id="totalSavings"></div>
<div class="red" id="totalLoan"></div>
<div class="green" id="totalInterest"></div>
<div class="green" id="groupBalance"></div>
<button class="export" onclick="exportPDF()">Export PDF</button>
<button class="export" onclick="exportExcel()">Export Excel</button>
</div>

<div class="card">
<h3>Members Overview</h3>
<div id="membersList"></div>
</div>

<script>
const PIN="6356";
const INTEREST=0.01;
const GRACE_DAYS=15;

let tapCount=0;

function tapTitle(){
tapCount++;
if(tapCount>=5){
document.getElementById("adminLogin").classList.remove("hidden");
tapCount=0;
}
}

let members=[
"RAI ARJU","SHERMA BHAKTI","BUDHATHOKI SUKDEV",
"SHAHI LAXMAN BAHADUR","SHRESTHA TEKINDRA",
"GHIMIRE SURESH","TIWARI SURYA PARSAD",
"TAMANG KESHAR","RAI MANDIP","MAGAR MIM DARLAMI"
];

let data=JSON.parse(localStorage.getItem("groupData"))||{};
members.forEach(m=>{
if(!data[m]) data[m]={savings:[],loans:[],payments:[]};
});

function save(){localStorage.setItem("groupData",JSON.stringify(data));}

function login(){
if(document.getElementById("pinInput").value===PIN){
document.getElementById("adminPanel").classList.remove("hidden");
alert("Admin Mode Activated");
}
}

function populate(){
["memberSelect","loanMember","payMember"].forEach(id=>{
let s=document.getElementById(id);
members.forEach(m=>{
let o=document.createElement("option");
o.value=m;o.text=m;s.appendChild(o);
});
});
}
populate();

function addSaving(){
let m=memberSelect.value;
data[m].savings.push({amount:Number(savingAmount.value),date:savingDate.value});
save();render();
}

function giveLoan(){
let m=loanMember.value;
data[m].loans.push({amount:Number(loanAmount.value),date:loanDate.value});
save();render();
}

function receivePayment(){
let m=payMember.value;
data[m].payments.push({amount:Number(payAmount.value),date:payDate.value});
save();render();
}

function calculateLoan(member){
let totalLoan=0,totalPaid=0,totalInterest=0;

data[member].loans.forEach(l=>{
let start=new Date(l.date);
let today=new Date();
let days=Math.floor((today-start)/(1000*60*60*24));

let months=Math.floor(days/30);
let extra=days%30;

if(months===0) months=1;
else if(extra>=GRACE_DAYS) months++;

let interest=l.amount*INTEREST*months;
totalInterest+=interest;
totalLoan+=l.amount+interest;
});

data[member].payments.forEach(p=>totalPaid+=p.amount);

return {due:totalLoan-totalPaid,interest:totalInterest};
}

function render(){
let html="";
let gSavings=0,gLoan=0,gInterest=0;

members.forEach(m=>{
let savings=data[m].savings.reduce((a,b)=>a+b.amount,0);
let loanInfo=calculateLoan(m);

gSavings+=savings;
gLoan+=loanInfo.due;
gInterest+=loanInfo.interest;

html+=`
<div class="card">
<h4>${m}</h4>
<div class="blue">Savings: ₩${savings.toLocaleString()}</div>
<div class="red">Loan Due: ₩${loanInfo.due.toLocaleString()}</div>
<div class="green">Interest Earned: ₩${loanInfo.interest.toLocaleString()}</div>
</div>`;
});

document.getElementById("membersList").innerHTML=html;
document.getElementById("totalSavings").innerText="Total Savings: ₩"+gSavings.toLocaleString();
document.getElementById("totalLoan").innerText="Total Loan Due: ₩"+gLoan.toLocaleString();
document.getElementById("totalInterest").innerText="Total Interest Earned: ₩"+gInterest.toLocaleString();
document.getElementById("groupBalance").innerText="Group Balance: ₩"+(gSavings-gLoan).toLocaleString();
}
render();

function exportPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text("Subham Savings Group Report",10,10);
doc.text("Total Savings: "+totalSavings.innerText,10,20);
doc.text("Total Loan: "+totalLoan.innerText,10,30);
doc.text("Total Interest: "+totalInterest.innerText,10,40);
doc.save("Subham_Report.pdf");
}

function exportExcel(){
let csv="Name,Savings,Loan Due,Interest\n";
members.forEach(m=>{
let savings=data[m].savings.reduce((a,b)=>a+b.amount,0);
let loanInfo=calculateLoan(m);
csv+=`${m},${savings},${loanInfo.due},${loanInfo.interest}\n`;
});
let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="Subham_Report.csv";
a.click();
}

if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
