<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subham Savings Group</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f4f6f9}
header{
background:#0d47a1;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}
.logo{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:bold;
}
.logo img{width:40px}
#adminBadge{
display:none;
background:#ffcc00;
color:black;
padding:4px 8px;
border-radius:6px;
font-size:12px;
}
button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer}
.admin-only{display:none}
.container{padding:15px}
.card{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

#adminBadge{
display:none;
background:#ffcc00;
color:black;
padding:4px 8px;
border-radius:6px;
font-size:12px;
margin-left:10px;
}

#loginBtn,#logoutBtn{
position:absolute;
right:15px;
top:15px;
padding:5px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

#loginBtn{ background:white; }
#logoutBtn{ background:#ff4444; color:white; display:none; }

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.member-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.member-card{
background:#e3f2fd;
padding:10px;
border-radius:8px;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.admin-only{ display:none; }

.green{color:green;}
.red{color:red;}
.blue{color:#1e88e5;}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:left;
}
</style>
</head>

<body>

<header>
Subham Savings Group
<span id="adminBadge">ADMIN MODE</span>
<button id="loginBtn" onclick="adminLogin()">Login</button>
<button id="logoutBtn" onclick="adminLogout()">Logout</button>
</header>

<div class="container">

<div class="card">
<h3>Dashboard</h3>
<p>Total Savings: <b id="totalSavings">0</b> KRW</p>
<p>Total Loan: <b id="totalLoan">0</b> KRW</p>
<p>Money Available: <b id="moneyAvailable">0</b> KRW</p>
<p>Total Capital of Group: <b id="totalCapital">0</b> KRW</p>
</div>

<div class="card">
<h3>Members</h3>
<div id="members" class="member-grid"></div>
</div>

<div class="card">
<h3>Add Transaction</h3>

<select id="memberSelect"></select>
<select id="typeSelect">
<option value="savings">Savings</option>
<option value="loan">Loan</option>
<option value="repayment">Repayment</option>
</select>
<input type="number" id="amountInput" placeholder="Amount">
<button onclick="addTransaction()">Add</button>

</div>

<div class="card">
<h3>Transactions</h3>
<table>
<thead>
<tr>
<th>Date</th>
<th>Member</th>
<th>Type</th>
<th>Amount</th>
<th class="admin-only">Action</th>
</tr>
</thead>
<tbody id="transactionTable"></tbody>
</table>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD8BSnJDY4ue-ifwK2G-so-3mWXr8OOepY",
  authDomain: "subhamsavingsgroup.firebaseapp.com",
  projectId: "subhamsavingsgroup",
  storageBucket: "subhamsavingsgroup.firebasestorage.app",
  messagingSenderId: "608599590080",
  appId: "1:608599590080:web:ca8cb8dca8b2618ec55925"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const members=[
"RAI ARJU",
"SHERMA BHAKTI",
"BUDHATHOKI SUKDEV",
"SHAHI LAXMAN BAHADUR",
"SHRESTHA TEKINDRA",
"GHIMIRE SURESH",
"TIWARI SURYA PARSAD",
"TAMANG KESHAR",
"RAI MANDIP",
"MAGAR MIM DARLAMI"
];

let admin=false;
let transactions=[];

const memberSelect=document.getElementById("memberSelect");
members.forEach(m=>{
let option=document.createElement("option");
option.value=m;
option.text=m;
memberSelect.appendChild(option);
});

function adminLogin(){
let pin=prompt("Enter Admin PIN");
if(pin==="6356"){
admin=true;
document.getElementById("adminBadge").style.display="inline";
document.getElementById("logoutBtn").style.display="inline";
document.getElementById("loginBtn").style.display="none";
document.querySelectorAll(".admin-only")
.forEach(e=>e.style.display="table-cell");
alert("Admin Logged In");
}else{
alert("Wrong PIN");
}
}

function adminLogout(){
admin=false;
document.getElementById("adminBadge").style.display="none";
document.getElementById("logoutBtn").style.display="none";
document.getElementById("loginBtn").style.display="inline";
document.querySelectorAll(".admin-only")
.forEach(e=>e.style.display="none");
}

function addTransaction(){
let member=memberSelect.value;
let type=document.getElementById("typeSelect").value;
let amount=parseInt(document.getElementById("amountInput").value);

if(!amount) return alert("Enter amount");

db.collection("transactions").add({
member,type,amount,
date:new Date().toISOString()
});
}

function deleteTx(id){
if(!admin) return;
db.collection("transactions").doc(id).delete();
}

db.collection("transactions")
.orderBy("date","desc")
.onSnapshot(snapshot=>{
transactions=[];
snapshot.forEach(doc=>{
transactions.push({id:doc.id,...doc.data()});
});
render();
});

function render(){

let table="";
let totalSavings=0;
let totalLoan=0;

transactions.forEach(t=>{

if(t.type==="savings") totalSavings+=t.amount;
if(t.type==="loan") totalLoan+=t.amount;
if(t.type==="repayment") totalLoan-=t.amount;

table+=`
<tr>
<td>${new Date(t.date).toLocaleDateString()}</td>
<td>${t.member}</td>
<td>${t.type}</td>
<td>${t.amount} KRW</td>
<td class="admin-only">
<button onclick="deleteTx('${t.id}')">Delete</button>
</td>
</tr>
`;
});

document.getElementById("transactionTable").innerHTML=table;

document.getElementById("totalSavings").innerText=totalSavings;
document.getElementById("totalLoan").innerText=totalLoan;
document.getElementById("moneyAvailable").innerText=totalSavings-totalLoan;
document.getElementById("totalCapital").innerText=totalSavings;

renderMembers();
}

function renderMembers(){

let container=document.getElementById("members");
container.innerHTML="";

members.forEach(name=>{

let savings=0;
let loan=0;

transactions.forEach(t=>{
if(t.member===name){
if(t.type==="savings") savings+=t.amount;
if(t.type==="loan") loan+=t.amount;
if(t.type==="repayment") loan-=t.amount;
}
});

container.innerHTML+=`
<div class="member-card">
<h4>${name}</h4>
<p>Savings: <span class="blue">${savings}</span></p>
<p>Loan: <span class="red">${loan}</span></p>
<p>Balance: <span class="green">${savings-loan}</span></p>
</div>
`;
});
}

</script>

</body>
</html>
