<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subham Savings Group</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f4f6f9}
header{
background:#0d47a1;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}
.logo{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:bold;
}
.logo img{width:40px}
#adminBadge{
display:none;
background:#ffcc00;
color:black;
padding:4px 8px;
border-radius:6px;
font-size:12px;
}
button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer}
.admin-only{display:none}
.container{padding:15px}
.card{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
.member-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:12px;
}
.member-card{
background:#e3f2fd;
padding:12px;
border-radius:8px;
}
.green{color:green}
.red{color:red}
.blue{color:#1565c0}
table{width:100%;border-collapse:collapse}
th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}
.notice{
background:#fff3cd;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
Subham Savings Group
<span id="adminBadge">ADMIN MODE</span>
</div>

<div>
<button onclick="adminLogin()" id="loginBtn">Login</button>
<button onclick="adminLogout()" id="logoutBtn" style="display:none;background:#e53935;color:white">Logout</button>
<button onclick="exportPDF()">Export PDF</button>
</div>
</header>

<div class="container">

<div class="card notice">
<h3>Notice Board</h3>
<p id="noticeText"></p>
<textarea id="noticeInput" class="admin-only" placeholder="Write notice..."></textarea>
<button onclick="saveNotice()" class="admin-only">Save Notice</button>
</div>

<div class="card">
<h3>Members Panel</h3>
<div id="members" class="member-grid"></div>
</div>

<div class="card">
<h3>Add Transaction</h3>
<select id="memberSelect"></select>
<select id="typeSelect">
<option value="savings">Savings</option>
<option value="loan">Loan</option>
<option value="repayment">Repayment</option>
</select>
<input type="number" id="amountInput" placeholder="Amount">
<button onclick="addTransaction()">Add</button>
</div>

<div class="card">
<h3>Transactions</h3>
<table>
<thead>
<tr>
<th>Date</th>
<th>Member</th>
<th>Type</th>
<th>Amount</th>
<th class="admin-only">Action</th>
</tr>
</thead>
<tbody id="transactionTable"></tbody>
</table>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD8BSnJDY4ue-ifwK2G-so-3mWXr8OOepY",
  authDomain: "subhamsavingsgroup.firebaseapp.com",
  projectId: "subhamsavingsgroup",
  storageBucket: "subhamsavingsgroup.firebasestorage.app",
  messagingSenderId: "608599590080",
  appId: "1:608599590080:web:ca8cb8dca8b2618ec55925"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const members=[
"RAI ARJU",
"SHERMA BHAKTI",
"BUDHATHOKI SUKDEV",
"SHAHI LAXMAN BAHADUR",
"SHRESTHA TEKINDRA",
"GHIMIRE SURESH",
"TIWARI SURYA PARSAD",
"TAMANG KESHAR",
"RAI MANDIP",
"MAGAR MIM DARLAMI"
];

let transactions=[];
let admin=false;

members.forEach(m=>{
let opt=document.createElement("option");
opt.value=m;
opt.text=m;
memberSelect.appendChild(opt);
});

function adminLogin(){
let pin=prompt("Enter Admin PIN");
if(pin==="6356"){
admin=true;
adminBadge.style.display="inline";
logoutBtn.style.display="inline";
loginBtn.style.display="none";
document.querySelectorAll(".admin-only")
.forEach(e=>e.style.display="block");
}
}

function adminLogout(){
admin=false;
adminBadge.style.display="none";
logoutBtn.style.display="none";
loginBtn.style.display="inline";
document.querySelectorAll(".admin-only")
.forEach(e=>e.style.display="none");
}

function addTransaction(){
let member=memberSelect.value;
let type=typeSelect.value;
let amount=parseInt(amountInput.value);
if(!amount) return alert("Enter amount");

db.collection("transactions").add({
member,type,amount,date:new Date().toISOString()
});
}

function saveNotice(){
db.collection("settings").doc("notice").set({
text:noticeInput.value
});
}

db.collection("settings").doc("notice")
.onSnapshot(doc=>{
if(doc.exists){
noticeText.innerText=doc.data().text;
noticeInput.value=doc.data().text;
}
});

db.collection("transactions")
.orderBy("date","desc")
.onSnapshot(snapshot=>{
transactions=[];
snapshot.forEach(doc=>{
transactions.push({id:doc.id,...doc.data()});
});
render();
});

function render(){

let table="";
let today=new Date();

transactions.forEach(t=>{
table+=`
<tr>
<td>${new Date(t.date).toLocaleDateString()}</td>
<td>${t.member}</td>
<td>${t.type}</td>
<td>${t.amount} KRW</td>
<td class="admin-only">
<button onclick="deleteTx('${t.id}')">Delete</button>
</td>
</tr>`;
});

transactionTable.innerHTML=table;
renderMembers();
}

function renderMembers(){

membersDiv="";
let today=new Date();

members.forEach(name=>{

let savings=0;
let loan=0;
let interest=0;

transactions.forEach(t=>{
if(t.member===name){
let txDate=new Date(t.date);
let months=(today-txDate)/(1000*60*60*24*30);
let dueMonths=Math.floor(months);

if(t.type==="savings"){
savings+=t.amount;
interest+=t.amount*0.01*dueMonths;
}
if(t.type==="loan"){
loan+=t.amount;
}
if(t.type==="repayment"){
loan-=t.amount;
}
}
});

membersDiv+=`
<div class="member-card">
<h4>${name}</h4>
<p>Savings: <span class="blue">${savings}</span></p>
<p>Loan: <span class="red">${loan}</span></p>
<p>Due Interest (1%): <span class="green">${interest.toFixed(0)}</span></p>
</div>`;
});

members.innerHTML=membersDiv;
}

function deleteTx(id){
if(!admin) return;
db.collection("transactions").doc(id).delete();
}

function exportPDF(){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();
let y=20;

doc.setFontSize(16);
doc.text("Subham Savings Group - Report",20,10);

doc.setFontSize(10);

doc.text("Date",10,y);
doc.text("Member",40,y);
doc.text("Type",90,y);
doc.text("Amount",130,y);

y+=5;

transactions.forEach(t=>{
doc.text(new Date(t.date).toLocaleDateString(),10,y);
doc.text(t.member,40,y);
doc.text(t.type,90,y);
doc.text(t.amount+" KRW",130,y);
y+=7;
});

doc.save("Subham_Savings_Report.pdf");
}

</script>

</body>
</html>
